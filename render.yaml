services:
  # Express Backend Web Service
  - type: web
    name: apex-payroll-server
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # React Frontend Static Site
  - type: web
    name: apex-payroll-client
    env: static
    buildCommand: cd client && npm install && npm run build
    publishPath: client/dist
    routes:
      # Rewrites all routes to index.html to allow client-side SPA routing (resolves 404 on refresh)
      - type: rewrite
        source: /*
        destination: /index.html
